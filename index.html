<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Squiggly Note - Secure</title>
<style>
:root{--bg:#f2eee6;--paper:#fffdf9;--ink:#111;--muted:#68645d;--line:#d7d0c5;--soft:#ebe5da;--r:14px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,sans-serif;line-height:1.5}
#authScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:20px}
.auth-container{background:var(--paper);padding:30px;border-radius:12px;border:1px solid var(--line);max-width:400px;width:90%;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
.auth-container h1{margin:0 0 10px;color:var(--ink);font-size:1.5rem}
.auth-container p{margin:0 0 20px;color:var(--muted);font-size:0.9rem}
.auth-form{display:flex;flex-direction:column;gap:15px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-weight:600;font-size:0.9rem;color:var(--ink)}
.form-group input{padding:10px;border:1px solid var(--line);border-radius:8px;font-size:1rem;font-family:inherit}
.form-group input:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px rgba(17,17,17,0.1)}
.btn{background:var(--ink);color:var(--paper);padding:10px 16px;border:none;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600;transition:background 0.2s}
.btn:hover{background:#2a2a2a}
.btn:disabled{background:var(--muted);cursor:not-allowed}
.error-message{color:#c33;font-size:0.9rem;margin-top:-10px}
.session-timer{color:var(--muted);font-size:0.85rem;margin-top:10px;text-align:center}
#adminTab{margin-top:20px;padding-top:20px;border-top:1px solid var(--line)}
#adminTab h3{margin:0 0 15px}
</style></head><body>

<!-- Auth Screen -->
<div id="authScreen">
  <div class="auth-container">
    <h1>Squiggly Note</h1>
    <div id="authStep1" style="display:flex;flex-direction:column;gap:15px">
      <p>Sign in with your email</p>
      <div class="auth-form">
        <div class="form-group">
          <label for="emailInput">Email</label>
          <input type="email" id="emailInput" placeholder="Enter your email" required>
        </div>
        <button class="btn" id="emailSubmit">Continue</button>
        <div class="error-message" id="emailError"></div>
      </div>
    </div>
    
    <div id="authStep2" style="display:none;flex-direction:column;gap:15px">
      <p>Enter password</p>
      <div class="auth-form">
        <div class="form-group">
          <label for="passwordInput">Password</label>
          <input type="password" id="passwordInput" placeholder="Enter password">
        </div>
        <button class="btn" id="passwordSubmit">Sign In</button>
        <div class="error-message" id="passwordError"></div>
        <div class="session-timer">Session time: <span id="sessionTimer">15:00</span></div>
      </div>
    </div>
    
    <div id="authBanned" style="display:none;text-align:center">
      <p style="color:#c33;font-weight:600">Too many failed attempts</p>
      <p>You are banned for <span id="banTimer">30</span> minutes.</p>
    </div>
  </div>
</div>

<!-- Main App (hidden until authenticated) -->
<section class="landing" id="landing" style="display:none"><div class="shell"><nav class="nav"><div class="brand">Squiggly Note</div><div class="actions"><button class="btn" id="signIn">Sign in</button><button class="btn" id="homeSettings" title="Settings">⚙</button></div></nav><div style="text-align:center;padding:40px"><h2>Welcome to Squiggly Note</h2><p style="color:var(--muted)">A quieter place for your ideas</p></div></section>

<main class="app" id="app" style="display:none"><header class="topbar"><div><div class="brand">Squiggly Note</div><div class="eyebrow" id="workspaceIdentity">Your workspace</div></div><div class="actions"><button class="btn" id="workspaceSettings" title="Settings">⚙</button><button class="btn" id="account">Account</button></div></header><div style="display:grid;grid-template-columns:minmax(280px,1fr) 1fr 280px;height:100%;gap:0"><section class="sidebar"><div class="sidebar-head"><h2>Notes</h2><div class="notes-actions"><button class="btn" id="newNote">+ New note</button><button class="btn" id="exportNote">Export</button><button class="btn" id="deleteNote">Delete</button></div></div><div id="tabs" class="tabs"></div></section><section class="workspace"><header class="workspace-head"><div><span id="noteLabel">Untitled note</span><span class="eyebrow" id="saveState"></span></div><div class="actions"><button class="btn" id="workspaceSettings2" title="Settings">⚙</button></div></header><div class="editor-wrap"><input id="title" placeholder="Untitled note" spellcheck="true"><div id="editor" role="textbox" aria-multiline="true" contenteditable="true" spellcheck="true"></div></div><div class="toolbar"><label><input type="checkbox" id="transcribe"><span id="microphoneGlyph">🎤</span></label><div aria-label="Text formatting"></div><div class="actions"><button class="btn" id="concise">Make concise</button></div></div><div id="status"></div></section><section class="timeline"><h2>Settings</h2><div style="display:flex;flex-direction:column;gap:12px"><div><label><span>Theme</span><div class="choices"><button data-key="theme" data-value="light">Light</button><button data-key="theme" data-value="dark">Dark</button><button data-key="theme" data-value="auto">Auto</button></div></label></div><div><label>API tunnel (optional) <textarea id="apiTunnel" placeholder="https://...ngrok.io" spellcheck="false" style="width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;font-family:monospace;font-size:0.8rem"></textarea></label></div><div><label>OpenAI API key (optional, session only) <input id="openaiKey" type="password" placeholder="sk-..." spellcheck="false" style="width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;font-family:monospace;font-size:0.8rem"></label></div></div><div id="adminTab"><h3>Administrator Panel</h3><div style="display:grid;gap:8px"><button class="btn" id="clearAllData" style="background:#c33">Clear All User Data</button><button class="btn" id="resetFailedAttempts">Reset Failed Attempts</button><button class="btn" id="logoutAdmin">Logout</button></div></div></section></div></main>

<script>
// ===== AUTHENTICATION SYSTEM =====
const AUTH_STATE_KEY = 'squiggly-auth-state';
const FAILED_ATTEMPTS_KEY = 'squiggly-failed-attempts';
const BAN_TIME_KEY = 'squiggly-ban-time';
const USER_PASSWORD = 'Squishypatil';
const ADMIN_PASSWORD = 'chrisp';
const SESSION_DURATION = 15 * 60 * 1000;
const USER_BAN_TIME = 30 * 60 * 1000;
const ADMIN_BAN_TIME = 10 * 60 * 1000;
const MAX_FAILED_ATTEMPTS = 5;

class AuthSystem {
  constructor() {
    this.authScreen = document.getElementById('authScreen');
    this.emailInput = document.getElementById('emailInput');
    this.passwordInput = document.getElementById('passwordInput');
    this.authStep1 = document.getElementById('authStep1');
    this.authStep2 = document.getElementById('authStep2');
    this.authBanned = document.getElementById('authBanned');
    this.emailError = document.getElementById('emailError');
    this.passwordError = document.getElementById('passwordError');
    this.sessionTimer = document.getElementById('sessionTimer');
    this.banTimer = document.getElementById('banTimer');
    this.adminTab = document.getElementById('adminTab');
    
    this.sessionExpiry = null;
    this.isAdmin = false;
    this.timerInterval = null;
    this.banInterval = null;
    
    this.init();
  }

  init() {
    document.getElementById('emailSubmit').onclick = () => this.submitEmail();
    document.getElementById('passwordSubmit').onclick = () => this.submitPassword();
    document.getElementById('clearAllData').onclick = () => this.clearAllData();
    document.getElementById('resetFailedAttempts').onclick = () => this.resetFailedAttempts();
    document.getElementById('logoutAdmin').onclick = () => this.logout();
    
    this.emailInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') this.submitEmail();
    });
    
    this.passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') this.submitPassword();
    });
    
    this.checkAuth();
  }

  submitEmail() {
    const email = this.emailInput.value.trim();
    if (!email || !email.includes('@')) {
      this.emailError.textContent = 'Please enter a valid email';
      return;
    }
    
    this.emailError.textContent = '';
    localStorage.setItem(AUTH_STATE_KEY, JSON.stringify({ email, authenticated: false }));
    this.authStep1.style.display = 'none';
    this.authStep2.style.display = 'flex';
    this.passwordInput.value = '';
    this.passwordInput.focus();
  }

  submitPassword() {
    const password = this.passwordInput.value;
    
    if (this.isBanned()) {
      this.showBannedScreen();
      return;
    }
    
    const failedAttempts = this.getFailedAttempts();
    
    if (password === ADMIN_PASSWORD) {
      this.resetFailedAttempts();
      this.completeAuth(true);
      return;
    }
    
    if (password === USER_PASSWORD) {
      this.resetFailedAttempts();
      this.completeAuth(false);
      return;
    }
    
    this.setFailedAttempts(failedAttempts + 1);
    
    if (failedAttempts + 1 >= MAX_FAILED_ATTEMPTS) {
      this.setBanTime(Date.now() + USER_BAN_TIME);
      this.showBannedScreen();
      return;
    }
    
    this.passwordError.textContent = `Incorrect password. ${MAX_FAILED_ATTEMPTS - failedAttempts - 1} attempts remaining.`;
    this.passwordInput.value = '';
    this.passwordInput.focus();
  }

  completeAuth(isAdmin) {
    this.isAdmin = isAdmin;
    const authState = JSON.parse(localStorage.getItem(AUTH_STATE_KEY) || '{}');
    authState.authenticated = true;
    authState.isAdmin = isAdmin;
    localStorage.setItem(AUTH_STATE_KEY, JSON.stringify(authState));
    
    this.sessionExpiry = Date.now() + SESSION_DURATION;
    localStorage.setItem('squiggly-session-expiry', this.sessionExpiry);
    
    this.showApp();
    this.startSessionTimer();
    
    if (isAdmin) {
      this.adminTab.style.display = 'block';
    } else {
      this.adminTab.style.display = 'none';
    }
  }

  checkAuth() {
    const authState = JSON.parse(localStorage.getItem(AUTH_STATE_KEY) || '{}');
    const sessionExpiry = parseInt(localStorage.getItem('squiggly-session-expiry') || '0');
    
    if (authState.authenticated && sessionExpiry > Date.now()) {
      this.isAdmin = authState.isAdmin || false;
      this.sessionExpiry = sessionExpiry;
      this.showApp();
      this.startSessionTimer();
      
      if (this.isAdmin) {
        this.adminTab.style.display = 'block';
      } else {
        this.adminTab.style.display = 'none';
      }
    } else {
      this.showAuthScreen();
      this.resetAuthForm();
    }
  }

  isBanned() {
    const banTime = parseInt(localStorage.getItem(BAN_TIME_KEY) || '0');
    return banTime > Date.now();
  }

  getFailedAttempts() {
    return parseInt(localStorage.getItem(FAILED_ATTEMPTS_KEY) || '0');
  }

  setFailedAttempts(count) {
    localStorage.setItem(FAILED_ATTEMPTS_KEY, count.toString());
  }

  resetFailedAttempts() {
    localStorage.setItem(FAILED_ATTEMPTS_KEY, '0');
    localStorage.setItem(BAN_TIME_KEY, '0');
    alert('Failed login attempts have been reset.');
  }

  setBanTime(time) {
    localStorage.setItem(BAN_TIME_KEY, time.toString());
  }

  showBannedScreen() {
    this.authStep2.style.display = 'none';
    this.authBanned.style.display = 'block';
    this.startBanTimer();
  }

  startBanTimer() {
    if (this.banInterval) clearInterval(this.banInterval);
    
    const updateBanTimer = () => {
      const banTime = parseInt(localStorage.getItem(BAN_TIME_KEY) || '0');
      const remaining = Math.max(0, Math.ceil((banTime - Date.now()) / 1000));
      this.banTimer.textContent = Math.ceil(remaining / 60);
      
      if (remaining <= 0) {
        clearInterval(this.banInterval);
        this.resetFailedAttempts();
        this.resetAuthForm();
      }
    };
    
    updateBanTimer();
    this.banInterval = setInterval(updateBanTimer, 1000);
  }

  startSessionTimer() {
    if (this.timerInterval) clearInterval(this.timerInterval);
    
    const updateTimer = () => {
      const remaining = Math.max(0, this.sessionExpiry - Date.now());
      const minutes = Math.floor(remaining / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      this.sessionTimer.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
      
      if (remaining <= 0) {
        clearInterval(this.timerInterval);
        this.logout();
      }
    };
    
    updateTimer();
    this.timerInterval = setInterval(updateTimer, 1000);
  }

  showAuthScreen() {
    this.authScreen.style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('landing').style.display = 'none';
    document.body.style.overflow = 'hidden';
  }

  showApp() {
    this.authScreen.style.display = 'none';
    document.getElementById('app').style.display = 'grid';
    document.getElementById('landing').style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  resetAuthForm() {
    this.authStep1.style.display = 'flex';
    this.authStep2.style.display = 'none';
    this.authBanned.style.display = 'none';
    this.emailInput.value = '';
    this.passwordInput.value = '';
    this.emailError.textContent = '';
    this.passwordError.textContent = '';
    this.emailInput.focus();
  }

  clearAllData() {
    if (confirm('Are you sure you want to delete ALL user data? This cannot be undone.')) {
      localStorage.clear();
      location.reload();
    }
  }

  logout() {
    localStorage.removeItem(AUTH_STATE_KEY);
    localStorage.removeItem('squiggly-session-expiry');
    if (this.timerInterval) clearInterval(this.timerInterval);
    if (this.banInterval) clearInterval(this.banInterval);
    this.adminTab.style.display = 'none';
    this.showAuthScreen();
    this.resetAuthForm();
  }
}

// Initialize authentication system
const authSystem = new AuthSystem();
</script>

<style>
:root{--bg:#f2eee6;--paper:#fffdf9;--ink:#111;--muted:#68645d;--line:#d7d0c5;--soft:#ebe5da;--r:14px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,sans-serif;line-height:1.5}.shell{max-width:1200px;margin:0 auto}.nav{display:flex;justify-content:space-between;align-items:center;padding:20px;border-bottom:1px solid var(--line)}.brand{font-size:1.5rem;font-weight:700}.dialog{border:1px solid var(--line);border-radius:12px;padding:24px;background:var(--paper);box-shadow:0 20px 25px -5px rgba(0,0,0,0.1)}button{cursor:pointer}.btn{background:var(--ink);color:var(--paper);padding:8px 12px;border:none;border-radius:8px;font-size:0.9rem;font-weight:600}.btn:hover{background:#2a2a2a}.app{display:grid;grid-template-columns:minmax(280px,1fr) 1fr 280px;height:100vh}.sidebar{background:var(--soft);border-right:1px solid var(--line);overflow-y:auto}.tabs{display:flex;flex-direction:column;gap:8px;padding:10px}.tab{padding:10px;background:var(--paper);border:1px solid transparent;border-radius:8px;text-align:left;font-weight:600}.tab:hover{border-color:var(--line)}.tab.active{background:var(--ink);color:var(--paper)}.workspace{display:flex;flex-direction:column;overflow:hidden}#editor{flex:1;padding:20px;overflow-y:auto;outline:none}.timeline{border-left:1px solid var(--line);overflow-y:auto;padding:20px;background:var(--soft)}.choices{display:flex;gap:8px;flex-wrap:wrap}
</style>

</body>
</html>
